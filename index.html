<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🇳🇿 紐西蘭南島 14 天行程詳細地圖</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f5f5;
    --surface: #ffffff;
    --surface2: #f0f0f0;
    --text: #2d2d2d;
    --text-muted: #777777;
    --accent: #e76f51;
    --gold: #d4a017;
    --lake: #457b9d;
    --forest: #2a9d8f;
    --glacier: #a8dadc;
    --wedding: #e5989b;
    --day1: #e76f51;
    --day2: #f4a261;
    --day3: #e9c46a;
    --day4: #2a9d8f;
    --day5: #457b9d;
    --day6: #e5989b;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
  }

  #app {
    display: flex;
    height: 100vh;
  }

  /* Sidebar */
  .sidebar {
    width: 420px;
    min-width: 420px;
    background: var(--surface);
    display: flex;
    flex-direction: column;
    border-right: 1px solid rgba(0,0,0,0.08);
    z-index: 1000;
  }

  .sidebar-header {
    padding: 1.2rem 1.5rem;
    border-bottom: 1px solid rgba(0,0,0,0.08);
  }

  .sidebar-header .subtitle {
    font-size: 0.7rem;
    color: var(--accent);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 0.3rem;
  }

  .sidebar-header h2 {
    font-family: 'Noto Serif TC', serif;
    font-size: 1.3rem;
    font-weight: 700;
    background: linear-gradient(135deg, var(--gold), var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .sidebar-header .meta {
    font-size: 0.7rem;
    color: var(--text-muted);
    margin-top: 0.3rem;
  }

  /* Day tabs */
  .day-tabs {
    display: flex;
    flex-wrap: wrap;
    gap: 0.3rem;
    padding: 0.8rem 1rem;
    border-bottom: 1px solid rgba(0,0,0,0.08);
  }

  .day-tab {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.65rem;
    font-weight: 600;
    padding: 0.3rem 0.6rem;
    border-radius: 6px;
    border: 1px solid rgba(0,0,0,0.1);
    background: var(--surface2);
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.2s ease;
    white-space: nowrap;
  }

  .day-tab:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .day-tab.active {
    background: rgba(231, 111, 81, 0.1);
    border-color: var(--accent);
    color: var(--accent);
  }

  .day-tab.wedding {
    border-color: rgba(229, 152, 155, 0.3);
  }

  .day-tab.wedding.active {
    background: rgba(229, 152, 155, 0.1);
    border-color: var(--wedding);
    color: var(--wedding);
  }

  /* Day detail panel */
  .day-detail {
    flex: 1;
    overflow-y: auto;
    padding: 1rem 1.2rem;
  }

  .day-detail::-webkit-scrollbar { width: 4px; }
  .day-detail::-webkit-scrollbar-track { background: transparent; }
  .day-detail::-webkit-scrollbar-thumb { background: #ddd; border-radius: 2px; }

  .day-detail-empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--text-muted);
    text-align: center;
    padding: 2rem;
  }

  .day-detail-empty .icon {
    font-size: 3rem;
    margin-bottom: 1rem;
    opacity: 0.5;
  }

  .day-title {
    font-family: 'Noto Serif TC', serif;
    font-size: 1.5rem;
    font-weight: 700;
    margin-bottom: 0.3rem;
  }

  .day-title.wedding-title {
    color: var(--wedding);
  }

  .day-date-badge {
    display: inline-block;
    font-size: 0.75rem;
    color: var(--accent);
    background: rgba(231, 111, 81, 0.08);
    padding: 0.2rem 0.6rem;
    border-radius: 4px;
    margin-bottom: 1rem;
  }

  .day-date-badge.wedding-badge {
    color: var(--wedding);
    background: rgba(229, 152, 155, 0.1);
  }

  .day-section {
    margin-bottom: 1rem;
  }

  .day-section h4 {
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--accent);
    margin-bottom: 0.5rem;
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }

  .day-section ul {
    list-style: none;
    padding: 0;
  }

  .day-section li {
    font-size: 0.78rem;
    color: var(--text-muted);
    padding: 0.35rem 0;
    padding-left: 1rem;
    position: relative;
    line-height: 1.5;
  }

  .day-section li::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0.7rem;
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: var(--accent);
    opacity: 0.5;
  }

  .poi-link {
    color: var(--gold);
    cursor: pointer;
    text-decoration: underline;
    text-decoration-style: dotted;
    text-underline-offset: 3px;
    transition: color 0.2s;
  }

  .poi-link:hover {
    color: var(--accent);
  }

  .route-info {
    background: var(--surface2);
    border-radius: 8px;
    padding: 0.8rem;
    margin-top: 0.8rem;
    font-size: 0.75rem;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .route-info .arrow {
    color: var(--accent);
  }

  /* Search button in popup */
  .poi-search-btn {
    width: 100%;
    padding: 6px 12px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 6px;
    font-size: 0.75rem;
    cursor: pointer;
    transition: background 0.2s;
  }
  .poi-search-btn:hover { background: #d35400; }

  /* Map container */
  .map-container {
    flex: 1;
    position: relative;
  }

  #map {
    width: 100%;
    height: 100%;
  }

  /* Dark map tiles */
  .leaflet-container {
    background: #f0f0f0;
  }

  /* Custom popup */
  .leaflet-popup-content-wrapper {
    background: #fff !important;
    color: var(--text) !important;
    border-radius: 10px !important;
    border: 1px solid rgba(255,255,255,0.1) !important;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5) !important;
  }

  .leaflet-popup-tip {
    background: #fff !important;
  }

  .leaflet-popup-content {
    font-family: 'Noto Serif TC', 'DM Sans', sans-serif !important;
    margin: 10px 14px !important;
    font-size: 0.85rem !important;
    line-height: 1.5 !important;
  }

  .popup-title {
    font-weight: 700;
    font-size: 0.95rem;
    margin-bottom: 0.3rem;
  }

  .popup-meta {
    font-size: 0.7rem;
    color: var(--text-muted);
    margin-bottom: 0.5rem;
  }

  .popup-desc {
    font-size: 0.75rem;
    color: var(--text-muted);
  }

  .popup-day-tag {
    display: inline-block;
    font-size: 0.65rem;
    padding: 0.15rem 0.4rem;
    border-radius: 3px;
    margin-right: 0.3rem;
    margin-bottom: 0.3rem;
  }

  .tag-day1 { background: rgba(231,111,81,0.12); color: #d35400; }
  .tag-day2 { background: rgba(244,162,97,0.12); color: #e67e22; }
  .tag-day3 { background: rgba(233,196,106,0.15); color: #b8860b; }
  .tag-day4 { background: rgba(42,157,143,0.12); color: #1a7a6f; }
  .tag-day5 { background: rgba(69,123,157,0.12); color: #2c6e8a; }
  .tag-day6 { background: rgba(229,152,155,0.12); color: #c0392b; }

  /* Legend */
  .map-legend {
    position: absolute;
    bottom: 1.5rem;
    right: 1.5rem;
    background: rgba(255, 255, 255, 0.95);
    backdrop-filter: blur(10px);
    border-radius: 10px;
    padding: 0.8rem 1rem;
    border: 1px solid rgba(0,0,0,0.1);
    font-size: 0.7rem;
    z-index: 1000;
  }

  .map-legend h4 {
    font-size: 0.7rem;
    margin-bottom: 0.4rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  .legend-row {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    margin-bottom: 0.25rem;
  }

  .legend-icon {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }


  /* Responsive */
  @media (max-width: 900px) {
    #app { flex-direction: column; }
    .sidebar {
      width: 100%;
      min-width: 100%;
      max-height: 45vh;
    }
    .map-container { height: 55vh; }
  }
</style>
</head>

</div>

// ===== CREATE CUSTOM ICONS =====
function createIcon(type, isWedding) {
  const cfg = typeConfig[type] || typeConfig.landmark;
  const size = cfg.size;
  const color = isWedding ? '#e5989b' : cfg.color;
  const pulseClass = isWedding ? ' wedding-pulse' : '';

  return L.divIcon({
    className: 'custom-marker' + pulseClass,
    html: `<div style="
      width:${size}px;height:${size}px;
      background:${color};
      border:2px solid rgba(255,255,255,0.3);
      border-radius:50%;
      box-shadow:0 0 ${size/2}px ${color}88;
      ${isWedding ? 'animation:weddingPulse 2s ease-in-out infinite;' : ''}
    "></div>`,
    iconSize: [size, size],
    iconAnchor: [size/2, size/2],
    popupAnchor: [0, -size/2]
  });
}

}).addTo(map);

// ===== ADD POI MARKERS =====
const markerMap = {};
const poiGroup = L.featureGroup().addTo(map);

pois.forEach(poi => {
  const isWedding = poi.id === 'queenstown';
  const icon = createIcon(poi.type, isWedding);
  const dayTag = `<span class="popup-day-tag tag-day${Math.min(poi.day, 6)}">Day ${poi.day}</span>`;
  const marker = L.marker([poi.lat, poi.lng], { icon })
    .bindPopup(`
      <div class="popup-title">${poi.name}</div>
      <div class="popup-meta">${poi.nameEn} ${dayTag}</div>
      <div class="popup-desc">${poi.desc}</div>
      <div style="margin-top:8px"><button class="poi-search-btn" onclick="event.stopPropagation();window.open('https://www.google.com/search?q=${encodeURIComponent(poi.nameEn)}+${encodeURIComponent(poi.name)}&tbm=isch','_blank')">🔍 Google 搜尋圖片與資訊</button></div>
    `);

  marker.on('click', () => {
    showDayDetail(poi.day);
    highlightDayTab(poi.day);
  });

  marker.addTo(poiGroup);
  markerMap[poi.id] = marker;
});

// ===== SIDEBAR TABS =====
const dayTabsEl = document.getElementById('dayTabs');
const dayDetailEl = document.getElementById('dayDetail');

days.forEach(d => {
  const tab = document.createElement('div');
  tab.className = 'day-tab' + (d.wedding ? ' wedding' : '');
  tab.textContent = `Day ${d.day}`;
  tab.title = d.city;
  tab.addEventListener('click', () => {
    showDayDetail(d.day);
    highlightDayTab(d.day);
    flyToDay(d.day);
  });
  dayTabsEl.appendChild(tab);
});

function highlightDayTab(dayNum) {
  document.querySelectorAll('.day-tab').forEach((t, i) => {
    t.classList.toggle('active', i === dayNum - 1);
  });
}

function showDayDetail(dayNum) {
  const d = days[dayNum - 1];
  if (!d) return;

  let html = `<div class="day-title${d.wedding ? ' wedding-title' : ''}">${d.title}</div>`;
  html += `<div class="day-date-badge${d.wedding ? ' wedding-badge' : ''}">${d.date} · ${d.city}${d.wedding ? ' 💍 Wedding Day' : ''}</div>`;

  if (d.route) {
    html += `<div class="route-info">🚗 ${d.route.from} <span class="arrow">→</span> ${d.route.to} · ${d.route.distance}</div>`;
  }

  d.sections.forEach(s => {
    html += `<div class="day-section"><h4>${s.title}</h4><ul>`;
    s.items.forEach(item => {
      html += `<li>${item}</li>`;
    });
    html += `</ul></div>`;
  });

  dayDetailEl.innerHTML = html;

  // Bind POI links
  dayDetailEl.querySelectorAll('.poi-link').forEach(link => {
    link.addEventListener('click', (e) => {
      e.stopPropagation();
      const poiId = link.dataset.poi;
      const marker = markerMap[poiId];
      if (marker) {
        map.flyTo(marker.getLatLng(), 14, { duration: 1 });
        setTimeout(() => marker.openPopup(), 600);
      }
    });
  });
}

function flyToDay(dayNum) {
  const d = days[dayNum - 1];
  if (!d) return;
  const dayPois = pois.filter(p => p.day === dayNum);
  if (dayPois.length > 0) {
    const firstPoi = dayPois[0];
    map.flyTo([firstPoi.lat, firstPoi.lng], 10, { duration: 1 });
  }
}

  }
  .custom-marker { background: transparent !important; border: none !important; }
  .route-line { animation: dashMove 20s linear infinite; }
  @keyframes dashMove { to { stroke-dashoffset: -120; } }
`;
document.head.appendChild(styleEl);
